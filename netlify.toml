[build]
  base    = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

# Correct MIME types for JS/CSS assets (fixes module script MIME errors)
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

# Canonical production origin for MiniPay allowlisting.
# MiniPay's production provider checks the exact origin, so keep every public
# entry point on the same host that is submitted/approved in MiniPay.
[[redirects]]
  from   = "https://nukko.xyz/*"
  to     = "https://www.nukko.xyz/:splat"
  status = 301
  force  = true

# SPA fallback — send all routes to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
